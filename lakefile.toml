name = "PQXDH-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PQXDHLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc3"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso.git"
rev = "no-modules/69981335508430ec0fc09241f535aa353c1e978e"

[[lean_lib]]
name = "PQXDHLean"
