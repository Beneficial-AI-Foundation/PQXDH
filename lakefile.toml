name = "PQXDH-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PQXDHLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc6"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso"
rev = "no-modules/4539e605ff834c35ecc0bcd0b7daec69163fd9f0"

[[lean_lib]]
name = "PQXDHLean"
