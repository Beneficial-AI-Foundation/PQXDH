name = "PQXDH-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PQXDHLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc3"

[[require]]
name = "verso"
git = "https://github.com/ejgallego/verso"
rev = "bp"

[[lean_lib]]
name = "PQXDHLean"

[[lean_lib]]
name = "PQXDHDocs"
srcDir = "docs"

[[lean_exe]]
name = "pqxdhdocs"
srcDir = "docs"
root = "PQXDHDocsMain"
supportInterpreter = true
