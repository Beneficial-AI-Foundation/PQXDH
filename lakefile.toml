name = "PQXDH-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PQXDHLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "VCVio"
git = "https://github.com/Verified-zkEVM/VCV-io.git"
rev = "ebea2fa"

[[lean_lib]]
name = "PQXDHLean"
