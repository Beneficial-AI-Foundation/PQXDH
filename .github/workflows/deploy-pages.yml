name: Deploy Website to GitHub Pages

on:
  push:
    branches: [master, add-callgraph-workflow] # TODO: remove feature branch before merge
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Verso Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            .lake
            docs/.lake
          key: ${{ runner.os }}-lake-docs-${{ hashFiles('lake-manifest.json', 'lean-toolchain', 'docs/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-docs-

      - name: Download Mathlib cache
        run: |
          lake exe cache get 2>&1 || echo "cache get returned non-zero (may be partial)"

      - name: Build main project
        run: |
          lake build

      - name: Build Verso docs
        run: |
          lake -d docs build docs

      - name: Generate documentation site
        run: |
          docs/.lake/build/bin/docs --output site

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Restore callgraph from cache
        id: cache-callgraph
        uses: actions/cache/restore@v4
        with:
          path: callgraph
          key: callgraph-nevermatch
          restore-keys: callgraph-

      - name: Copy callgraph to site
        run: |
          if [ -f callgraph/index.html ]; then
            echo "Callgraph restored from cache"
            mkdir -p site/callgraph
            cp -r callgraph/* site/callgraph/
          else
            echo "No callgraph in cache (expected on first run or if cache expired)"
            echo "Deploying docs without callgraph"
          fi

      - name: List final site structure
        run: |
          echo "=== Site structure ==="
          find site -type f | head -50
          echo "..."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
