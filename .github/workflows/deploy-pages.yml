name: Deploy Website to GitHub Pages

on:
  push:
    branches: [master, add-callgraph-workflow] # TODO: remove feature branch before merge
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Verso Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            .lake
            docs/.lake
          key: ${{ runner.os }}-lake-docs-${{ hashFiles('lake-manifest.json', 'lean-toolchain', 'docs/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-docs-

      - name: Download Mathlib cache
        run: |
          lake exe cache get 2>&1 || echo "cache get returned non-zero (may be partial)"

      - name: Build main project
        run: |
          lake build

      - name: Build API docs
        run: |
          lake build PQXDHLean:docs

      - name: Build Verso docs
        run: |
          lake -d docs build docs

      - name: Generate documentation site
        run: |
          docs/.lake/build/bin/docs --output site

      - name: Copy API docs to site
        run: |
          mkdir -p site/api
          cp -r .lake/build/doc/* site/api/

      - name: Add root landing page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PQXDH Lean Formalization</title>
            <style>
              body { font-family: system-ui, -apple-system, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; color: #333; line-height: 1.6; }
              h1 { margin-bottom: 0.3em; }
              .subtitle { color: #666; margin-top: 0; }
              .links { list-style: none; padding: 0; margin-top: 2em; }
              .links li { margin: 1em 0; }
              .links a { font-size: 1.15em; text-decoration: none; color: #0366d6; }
              .links a:hover { text-decoration: underline; }
              .links .desc { display: block; color: #666; font-size: 0.9em; margin-top: 0.2em; }
            </style>
          </head>
          <body>
            <h1>PQXDH Lean Formalization</h1>
            <p class="subtitle">Formal verification of the Post-Quantum Extended Diffie-Hellman protocol</p>
            <ul class="links">
              <li>
                <a href="html-multi/">X3DH in Lean &mdash; Documentation</a>
                <span class="desc">Protocol specification with verified code examples</span>
              </li>
              <li>
                <a href="api/">API Reference</a>
                <span class="desc">Auto-generated documentation for all definitions and theorems</span>
              </li>
              <li>
                <a href="callgraph/">Call Graph</a>
                <span class="desc">Interactive dependency and verification status viewer</span>
              </li>
            </ul>
            <p><a href="https://github.com/Beneficial-AI-Foundation/signal-shot-PQXDH">Source on GitHub</a></p>
          </body>
          </html>
          EOF

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Restore callgraph from cache
        id: cache-callgraph
        uses: actions/cache/restore@v4
        with:
          path: callgraph
          key: callgraph-nevermatch
          restore-keys: callgraph-

      - name: Copy callgraph to site
        run: |
          if [ -f callgraph/index.html ]; then
            echo "Callgraph restored from cache"
            mkdir -p site/callgraph
            cp -r callgraph/* site/callgraph/
          else
            echo "No callgraph in cache (expected on first run or if cache expired)"
            echo "Deploying docs without callgraph"
          fi

      - name: List final site structure
        run: |
          echo "=== Site structure ==="
          find site -type f | head -50
          echo "..."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
